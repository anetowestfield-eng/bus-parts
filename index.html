            { brand: "Sticky Note", description: "Unknown", partNumber: "635921 / 635619", notes: "" }
          ];

          // Logic to deduplicate based on partNumber
          const inventoryData = useMemo(() => {
            const uniqueMap = new Map();
            
            rawInventoryData.forEach(item => {
              // Normalize part number (remove spaces for comparison)
              const key = item.partNumber.trim();
              
              if (!uniqueMap.has(key)) {
                uniqueMap.set(key, item);
              } else {
                const existing = uniqueMap.get(key);
                if (item.notes && !existing.notes) {
                  // If notes field is not empty, append it
                  if (existing.notes) {
                      if (!existing.notes.includes(item.notes)) {
                          existing.notes = existing.notes + ", " + item.notes;
                      }
                  } else {
                      existing.notes = item.notes;
                  }
                }
                // Append description if different and not just a brand change
                if (item.description !== existing.description && !existing.description.includes(item.description)) {
                   existing.description = existing.description + " / " + item.description;
                }
              }
            });
            
            return Array.from(uniqueMap.values());
          }, []);

          const handleSort = (key) => {
            let direction = 'ascending';
            if (sortConfig.key === key && sortConfig.direction === 'ascending') {
              direction = 'descending';
            }
            setSortConfig({ key, direction });
          };

          const sortedData = useMemo(() => {
            let sortableItems = [...inventoryData];
            if (sortConfig.key !== null) {
              sortableItems.sort((a, b) => {
                if (a[sortConfig.key] < b[sortConfig.key]) {
                  return sortConfig.direction === 'ascending' ? -1 : 1;
                }
                if (a[sortConfig.key] > b[sortConfig.key]) {
                  return sortConfig.direction === 'ascending' ? 1 : -1;
                }
                return 0;
              });
            }
            return sortableItems;
          }, [inventoryData, sortConfig]);

            item.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.brand.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.partNumber.includes(searchTerm)
          );

                  </div>
                  {rawInventoryData.length > inventoryData.length && (
                  )}
                </div>

                {/* Grid/Table */}
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 text-slate-700 text-sm uppercase tracking-wider border-b">
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('brand')}
                        >
                          <div className="flex items-center gap-2">
                            <WrenchIcon className="w-4 h-4" />
                            Brand
                            {sortConfig.key === 'brand' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('description')}
                        >
                          <div className="flex items-center gap-2">
                            <FileTextIcon className="w-4 h-4" />
                            Description
                            {sortConfig.key === 'description' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('partNumber')}
                        >
                          <div className="flex items-center gap-2">
                            <HashIcon className="w-4 h-4" />
                            Part Number
                            {sortConfig.key === 'partNumber' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th className="p-4 notes-col">Notes</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-200">
                      {filteredData.length > 0 ? (
                        filteredData.map((item, index) => (
                          <tr 
                            key={index} 
                            className="hover:bg-blue-50 transition-colors group"
                          >
                            <td className="p-4 font-medium text-slate-700">
                              <span className={`inline-block px-2 py-1 rounded-full text-xs ${
                                item.brand === 'Gillig' ? 'bg-red-100 text-red-700' :
                                item.brand === 'New Flyer' ? 'bg-blue-100 text-blue-700' :
                                'bg-gray-200 text-gray-700'
                              }`}>
                                {item.brand}
                              </span>
                            </td>
                            <td className="p-4 text-slate-800 font-semibold">{item.description}</td>
                            <td className="p-4 font-mono text-blue-600 bg-slate-50 group-hover:bg-white rounded px-2">{item.partNumber}</td>
                            <td className="p-4 text-slate-500 text-sm italic">{item.notes}</td>
                          </tr>
                        ))
                      ) : (
                        <tr>
                          <td colSpan="4" className="p-8 text-center text-slate-500">
                            No parts found matching "{searchTerm}"
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventoryGrid />);
    </script>
