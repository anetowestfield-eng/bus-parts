            { brand: "New Flyer", description: "Long Rear Stud New Flyer", partNumber: "40201", notes: "" },
            { brand: "Universal", description: "Air Union", partNumber: "596 / 285", notes: "3/8 Air Line" },
            { brand: "Universal", description: "Diesel Fuel Filler Neck", partNumber: "47976", notes: "" },

            { brand: "Universal", description: "100 Amp Fuse", partNumber: "40342", notes: "" },
            { brand: "Universal", description: "Rear Engine Door Gas Shock", partNumber: "78203", notes: "" },
            { brand: "Toolbox", description: "Wheels (Swivel)", partNumber: "15977", notes: "" },
            { brand: "Toolbox", description: "Wheels (Rigid)", partNumber: "15976", notes: "" },

            { brand: "Universal", description: "Spray Degreaser", partNumber: "30621", notes: "" },
            { brand: "Universal", description: "Bus Key", partNumber: "78758", notes: "Phone: 352-436-7732" },
            { brand: "Universal", description: "De-Pinner", partNumber: "17498", notes: "" },
            { brand: "Universal", description: "Black Sealant Window", partNumber: "49210", notes: "" },
            { brand: "Universal", description: "Gasket Maker Grey", partNumber: "3696", notes: "" },
            { brand: "Universal", description: "16 LB Radiator Cap", partNumber: "72929", notes: "" },
            { brand: "Universal", description: "1/2 inch Brake Air Hose Line", partNumber: "30176", notes: "" },
            { brand: "Universal", description: "Small Door / Gas Door Rod", partNumber: "70683", notes: "" },
            { brand: "Universal", description: "Oil Cooler", partNumber: "30563", notes: "" },
            { brand: "Universal", description: "Oil Cooler Gasket", partNumber: "34172", notes: "" },
            { brand: "Universal", description: "Oil Dipstick", partNumber: "30147", notes: "" },
            { brand: "Universal", description: "Plastic Coolant Line", partNumber: "30533", notes: "Front of Motor" },
            { brand: "Universal", description: "Crank / Cam Sensor", partNumber: "74980", notes: "" },
            { brand: "Universal", description: "Wheelchair Stop Request Button", partNumber: "48704", notes: "" },
            { brand: "Universal", description: "O2 Sensor", partNumber: "49659", notes: "" },
            { brand: "Universal", description: "Radiator", partNumber: "72938", notes: "" },
            { brand: "Universal", description: "Radiator (Alternate)", partNumber: "80767", notes: "" },
            { brand: "Universal", description: "Driver Seat", partNumber: "74688", notes: "" },
            { brand: "Universal", description: "R-14 Valve", partNumber: "74622", notes: "" },
            { brand: "Universal", description: "Short EGR Coolant Hose", partNumber: "75297", notes: "45° / 90°" },
            { brand: "Universal", description: "Exhaust Temp Sensor", partNumber: "49661", notes: "" },
            { brand: "Universal", description: "Door Controller", partNumber: "80722", notes: "" },
            { brand: "Universal", description: "Air Gun Fitting", partNumber: "495", notes: "" },
            { brand: "Universal", description: "23 Inch Light Strip", partNumber: "73087", notes: "" },
            { brand: "Universal", description: "Bike Rack Frame/Mount", partNumber: "72925", notes: "2500 Busses" },
            { brand: "Universal", description: "2.5\" 90 Degree Lower Radiator Hose", partNumber: "47036", notes: "" },
            { brand: "Universal", description: "Seat Pad for Seat Alarm", partNumber: "72612", notes: "" },
            { brand: "Universal", description: "Windshield Sealant", partNumber: "40227", notes: "Adhesive" },
            { brand: "Universal", description: "Proximity Switch", partNumber: "47784", notes: "" },
            { brand: "Universal", description: "Fuel Outlet Pressure/Temp Sensor", partNumber: "33678", notes: "" },
            { brand: "Universal", description: "Fuel Inlet Sensor", partNumber: "80975", notes: "" },
            { brand: "Universal", description: "Dual Sensor", partNumber: "75272", notes: "" },
            { brand: "Sticky Note", description: "Unknown", partNumber: "635921 / 635619", notes: "" }
          ];

          // Logic to deduplicate based on partNumber
          const inventoryData = useMemo(() => {
            const uniqueMap = new Map();
            
            rawInventoryData.forEach(item => {
              // Normalize part number (remove spaces for comparison)
              const key = item.partNumber.trim();
              
              if (!uniqueMap.has(key)) {
                uniqueMap.set(key, item);
              } else {
                const existing = uniqueMap.get(key);
                if (item.notes && !existing.notes) {
                  existing.notes = item.notes;
                }
                // Append description if different and not just a brand change
                if (item.description !== existing.description && !existing.description.includes(item.description)) {
                   existing.description = existing.description + " / " + item.description;
                }
              }
            });
            
            return Array.from(uniqueMap.values());
          }, []);

          const handleSort = (key) => {
            let direction = 'ascending';
            if (sortConfig.key === key && sortConfig.direction === 'ascending') {
              direction = 'descending';
            }
            setSortConfig({ key, direction });
          };

          const sortedData = useMemo(() => {
            let sortableItems = [...inventoryData];
            if (sortConfig.key !== null) {
              sortableItems.sort((a, b) => {
                if (a[sortConfig.key] < b[sortConfig.key]) {
                  return sortConfig.direction === 'ascending' ? -1 : 1;
                }
                if (a[sortConfig.key] > b[sortConfig.key]) {
                  return sortConfig.direction === 'ascending' ? 1 : -1;
                }
                return 0;
              });
            }
            return sortableItems;
          }, [inventoryData, sortConfig]);

          const filteredData = sortedData.filter(item =>
            item.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.brand.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.partNumber.includes(searchTerm)
          );

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans">
              <div className="max-w-6xl mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
                {/* Header */}
                <div className="bg-slate-800 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                  <div>
                    <h1 className="text-2xl font-bold flex items-center gap-2">
                      <PackageIcon className="w-8 h-8 text-blue-400" />
                      Bus Parts Inventory
                    </h1>
                    <p className="text-slate-400 mt-1">Digital catalog with {inventoryData.length} unique parts</p>
                  </div>
                  <div className="relative w-full md:w-96">
                    <input
                      type="text"
                      placeholder="Search by part, brand, or number..."
                      className="w-full pl-10 pr-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    <div className="absolute left-3 top-2.5 text-slate-400">
                        <SearchIcon className="w-5 h-5" />
                    </div>
                  </div>
                </div>

                {/* Stats */}
                <div className="bg-slate-100 p-4 border-b flex justify-between items-center text-sm text-slate-600">
                  <div className="flex gap-6">
                     <div className="font-semibold">Unique Parts: <span className="text-blue-600">{inventoryData.length}</span></div>
                     <div className="font-semibold">Showing: <span className="text-blue-600">{filteredData.length}</span></div>
                  </div>
                  {rawInventoryData.length > inventoryData.length && (
                    <div className="flex items-center gap-1 text-amber-600">
                       <span className="flex items-center gap-1"><AlertCircleIcon className="w-4 h-4" /> {rawInventoryData.length - inventoryData.length} duplicates hidden</span>
                    </div>
                  )}
                </div>

                {/* Grid/Table */}
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-50 text-slate-700 text-sm uppercase tracking-wider border-b">
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('brand')}
                        >
                          <div className="flex items-center gap-2">
                            <WrenchIcon className="w-4 h-4" />
                            Brand
                            {sortConfig.key === 'brand' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('description')}
                        >
                          <div className="flex items-center gap-2">
                            <FileTextIcon className="w-4 h-4" />
                            Description
                            {sortConfig.key === 'description' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th 
                          className="p-4 cursor-pointer hover:bg-slate-100 transition-colors"
                          onClick={() => handleSort('partNumber')}
                        >
                          <div className="flex items-center gap-2">
                            <HashIcon className="w-4 h-4" />
                            Part Number
                            {sortConfig.key === 'partNumber' && (
                              <span className="text-xs text-blue-500">{sortConfig.direction === 'ascending' ? '▲' : '▼'}</span>
                            )}
                          </div>
                        </th>
                        <th className="p-4">Notes</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-200">
                      {filteredData.length > 0 ? (
                        filteredData.map((item, index) => (
                          <tr 
                            key={index} 
                            className="hover:bg-blue-50 transition-colors group"
                          >
                            <td className="p-4 font-medium text-slate-700">
                              <span className={`inline-block px-2 py-1 rounded-full text-xs ${
                                item.brand === 'Gillig' ? 'bg-red-100 text-red-700' :
                                item.brand === 'New Flyer' ? 'bg-blue-100 text-blue-700' :
                                'bg-gray-200 text-gray-700'
                              }`}>
                                {item.brand}
                              </span>
                            </td>
                            <td className="p-4 text-slate-800 font-semibold">{item.description}</td>
                            <td className="p-4 font-mono text-blue-600 bg-slate-50 group-hover:bg-white rounded px-2">{item.partNumber}</td>
                            <td className="p-4 text-slate-500 text-sm italic">{item.notes}</td>
                          </tr>
                        ))
                      ) : (
                        <tr>
                          <td colSpan="4" className="p-8 text-center text-slate-500">
                            No parts found matching "{searchTerm}"
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventoryGrid />);
    </script>
</body>
</html>
